<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
     <script src="js/ancTracker.js" defer></script>
     <link rel="stylesheet" href="css/ancTracker.css">
</head>
<body>
    <header class="header">
        <div class="header-box1">
            <img src="images/image 11.svg" alt="">
            <p>Women Registry</p>
        </div>
        <div class="header-box2">
            <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Search...">
            </div>
            <div>
                <h2 id="date">Fri, 15 May 2026</h2>
            </div>
        </div>

    </header>


    <main class="main-container">
        <aside class="left">

            <div class="left-container">
                <!--Main under the left container-->
                <div class="main-sub">MAIN</div>

                <div class="overview">
                    <img src="images/mage_dashboard.svg" alt="">
                    <h3>Overview</h3>
                </div>
                <div class="registry">
                    <img src="images/mdi_register-outline.svg" alt="pregnant-woman">
                    <h3>Women Registry</h3>
                </div>
                <div class="tracker">
                    <img src="images/hugeicons_appointment-02.svg" alt="pregnant woman">
                    <h3>ANC Tracker</h3>
                </div>

                <!---Alerts-->
                <div class="main-sub">ALERTS</div>
                <div class="alert">
                    <img src="images/mingcute_alert-line.svg" alt="">
                    <h3>Red Flag Alerts</h3>
                </div>
                <div class="summary">
                    <img src="images/chart-square-bar.svg" alt="pregnant-woman">
                    <h3>Weekly Summary</h3>
                </div>

                <div class="main-sub">ACTIONS</div>
                <div class="action-enroll">
                    <img src="images/Icon.svg" alt="pregnant-woman">
                    <h3>Enroll New Mama</h3>
                </div>
            </div>


            
        </aside>
        <section class="right">
            <div class="inner-container">
                <!--First container-->
                <div class="first-container">
                    <div class="box1-1">
                        <h3>Due This Week</h3>
                        <div>6 Women</div>
                    </div>
                    <div></div>
                    <div></div>
                    <div></div>

                </div>

                <!--Second container-->
                <div class="second-container">
                    <div class="box2-1">
                        <h3>Missed Visits</h3>
                        <div>3 Women</div>
                    </div>
                    
                </div>
            </div>
        </section>
    

    
</body>
</html>
