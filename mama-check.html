<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mama check onboarding screen </title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/mama-check.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="js/main.js" defer></script>

</head>
<body>
    <section class="mama-check-container">
        <div class="mama-checkbox1">
            <h1>MAMA <img src="images/Group.svg" alt=""> CHECK</h1>
        </div>
        <!--Mama check images -->
        <div class="mama-checkbox2">
            <img src="images/Pregnant woman.svg" alt="mama-check">
        </div>
        <div class="mama-checkbox3">
            <h2>Welcome to Mama <span class="check">Check</span></h2>
            <h5>Supporting safer pregnancies through timely reminders and emergency awareness.</h5>
        </div>
        
    </section>
    <section class="reg-container">
        <div class="register-mama">
            <img src="images/bi_person-plus.svg" alt="mama-check">
            <h2><a href="registernewmama.html">Register New Mama</a></h2>
            <span><img src="images/weui_arrow-outlined.svg" alt=""></span>
        </div>
        <div class="view-dashboard">
            <img src="images/charm_chart-bar.svg" alt="">
            <h2>
            <a href="viewdashboard.html">View Dashboard</a></h2>
            
            <!-- <a href="registernewmama.html" class="register-mama">
                <img src="images/bi_person-plus.svg" alt="">
                <h2>Register New Mama</h2>
                <span><img src="images/weui_arrow-outlined.svg" alt=""></span>
            </a> -->
            <span><img src="images/Vector.svg" alt=""></span>
        </div>
    </section>
    <section class="dashboard-stats">
        <div class="registered-num">
            <div><img src="images/formkit_people.svg" alt=""></div>
            <div class="bold-num">128</div>
            <div>Mama's Registered</div>
        </div>
        <div class="due-date">
            <div><img src="images/solar_calendar-linear.svg" alt=""></div>
            <div class="bold-num">23</div>
            <div>Due This week</div>
        </div>
        <div class="due-alert">
            <div><img src="images/flowbite_bell-outline.svg" alt=""></div>
            <div class="bold-num">4</div>
            <div>Red Alerts</div>
        </div>
    </section>
    
</body>
</html>
