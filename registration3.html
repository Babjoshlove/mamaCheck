<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/registernewmama.css">
    <!--Java script-->
    <script src="js/login.js" defer></script>
</head>
<body>
    <main class="container">
        <section class="container">
            <div class="card">
                <div class="progress-container">
                    <div class="progress-bar3"></div>
                </div>
                <p class="step">Step 3 of 4</p>

                <h1>Pregnancy Details</h1>
                <p class="subtitle">Information used to schedule ANC reminders and monitoring.</p>

                <form id="registration-form3" action="">
                    <label for="Trusted contact Name">Trusted Contact Name</label>
                    <input type="text"
                        id=""
                        placeholder="Chinedu Okafor"
                        required
                    >
          
                    <label for="relationship">Relationship</label>
                    <div class="menstrualperiod">
                        <input type="text"
                            id="menstrualPeriod"
                            placeholder="Expected Delivery Date"
                            required
                        >
                    </div>
                    <button class="continue-btn"
                        type="button">
                        Continue
                    </button> 
                </form>
            </div>       
        </section>
    </main> 

</body>
</html>
