<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/registernewmama.css">
    <!--Java script-->
    <script src="js/login.js" defer></script>
</head>
<body>
    <main class="container">
        <section class="container">
            <div class="card">
                <div class="progress-container">
                    <div class="progress-bar3"></div>
                </div>
                <p class="step">Step 3 of 4</p>

                <h1>Trusted Contact</h1>
                <p class="subtitle">Add a family member or trusted person who can
                     support the mother during emergencies or ANC visits</p>

                <form id="registration-form3" action="">
                    <label for="Trusted contact Name">Trusted Contact Name</label>
                    <input type="text"
                        id=""
                        placeholder="Chinedu Okafor"
                        required
                    >

                    <select id="language" required>
                        <option value="">Relationship</option>
                        <option value="">Husband</option>
                        <option>Father</option>
                        <option>Mother</option>
                        <option>Uncle</option>
                        <option>Aunt</option>
                        <option>Sister</option>
                        <option>Brother</option>
                        <option>Others</option>
                    </select>

                    <div class="phone-group">
                        <span>+234</span>
                        <input
                            type="tel"
                            id="phone"
                            placeholder="Phone Number"
                            required
                        >
                    </div>

                    <select id="language" required>
                        <option value="">Preferred Language</option>
                        <option>English</option>
                        <option>Yoruba</option>
                        <option>Igbo</option>
                        <option>Hausa</option>
                        <option>French</option>
                    </select>
                    <button class="continue-btn"
                        type="button">
                        Continue
                    </button> 

                    <button class="skip-btn"
                        type="button">
                        Skip this step
                    </button> 
                </form>
            </div>       
        </section>
    </main> 

</body>
</html>
