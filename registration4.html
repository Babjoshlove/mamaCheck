<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Page</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/registernewmama.css">
    <!--Java script-->
</head>
<body>
    <main class="verification">
        <section class="verification">
            <div class="card">
                <div class="progress-container">
                    <div class="progress-bar4"></div>
                </div>
                <p class="step">Step 4 of 4</p>

                <div class="wrap-image">
                    <img src="images/Phone mock up.svg" alt="">
                    <h3>Verify Phone Number</h3>
                    <div class="card-p">
                        <p> Please enter the 6-digit verification code</p>
                        <p>that was sent to?</p>
                        <p>+234 xxx xxx xxxx </p>
                    </div>
                </div>
                <div class="otp-container">
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                    <input type="text" maxlength="1" class="otp-input" required>
                </div>
                <div class="verify-box">
                    <h4>Resend OTP</h4>
                    <h4>Change phone number</h4>
                    <button class="verify-btn"
                    onclick="window.location.href='ancTracker.html'">Verify Number</button>
                </div>

                </div>
            
                
        </section>
    </main> 
    
</body>
</html>
